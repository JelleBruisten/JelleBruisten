# This workflow builds and deploys an Angular app to GitHub Pages in one job
name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push changes to the gh-pages branch
      pages: write     # Required for GitHub Pages deployment
      id-token: write  # Needed for OIDC authentication

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18' # Recommended stable Node.js version for Angular

    - name: Install Dependencies
      run: npm install

    - name: Build Angular Project
      run: npm run build # Ensure this matches your `angular.json`

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
      with:
        folder: dist/jelle-bruisten/browser # Specify the folder containing the build output
