# This workflow builds and deploys an Angular app to GitHub Pages
name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # Build Job
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18' # Recommended stable Node.js version for Angular

    - name: Install Dependencies
      run: npm install

    - name: Build Angular Project
      run: npm run build # Ensure the output path matches your `angular.json`

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: github-pages
        path: dist/jelle-bruisten/browser # Specify the build output folder

  # Deployment Job
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}    
    permissions:
      pages: write    # Required for GitHub Pages deployment
      id-token: write # Needed for OIDC authentication
    steps:
    # - name: Download Build Artifact
    #   uses: actions/download-artifact@v3
    #   with:
    #     name: build

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
