# This workflow builds and deploys an Angular app to GitHub Pages
name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # Build Job
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18' # Recommended stable Node.js version for Angular

    - name: Install Dependencies
      run: npm install

    - name: Build Angular Project
      run: npm run build # Ensure the output path matches your `angular.json`

    - name: Set file permissions for build output
      run: |
        chmod -R 755 dist/jelle-bruisten/browser      

    - name: Check for symlinks in build output
      run: |
        find dist/jelle-bruisten/browser -type l

    - name: Remove symlinks in build output
      run: |
        find dist/jelle-bruisten/browser -type l -exec rm {} \;

    - name: Clean build folder (exclude hidden files)
      run: find dist/jelle-bruisten/browser -name ".*" -exec rm -rf {} \;        

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: github-pages
        path: dist/jelle-bruisten/browser # Specify the build output folder

  # Deployment Job
  deploy:
    # Add a dependency to the build job
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # or specific "vX.X.X" version tag for this action
